aid: aws-app-runner
name: AWS App Runner
description: >-
  AWS App Runner is a fully managed service that makes it easy to build, deploy,
  and run containerized web applications and APIs at scale. It automatically
  builds and deploys applications from container images or source code, load
  balances traffic with encryption, and scales to meet traffic needs without
  requiring infrastructure management. App Runner integrates with ECR, GitHub,
  Bitbucket, VPC, IAM, and CloudWatch for complete application delivery.
