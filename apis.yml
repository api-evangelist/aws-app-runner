aid: aws-app-runner
name: AWS App Runner
description: >-
  AWS App Runner is a fully managed service that makes it easy to build, deploy,
  and run containerized web applications and APIs at scale. It automatically
  builds and deploys applications, load balances traffic with encryption, and
  scales to meet traffic needs without requiring infrastructure management.
