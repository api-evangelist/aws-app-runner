components:
  schemas:
    Service:
      type: object
      properties:
        ServiceName:
          type: string
        ServiceId:
          type: string
        ServiceArn:
          type: string
        ServiceUrl:
          type: string
        CreatedAt:
          type: string
          format: date-time
        UpdatedAt:
          type: string
          format: date-time
        DeletedAt:
          type: string
          format: date-time
        Status:
          type: string
          enum:
          - CREATE_FAILED
          - RUNNING
          - DELETED
          - DELETE_FAILED
          - PAUSED
          - OPERATION_IN_PROGRESS
        SourceConfiguration:
          $ref: '#/components/schemas/SourceConfiguration'
        InstanceConfiguration:
          $ref: '#/components/schemas/InstanceConfiguration'
        HealthCheckConfiguration:
          $ref: '#/components/schemas/HealthCheckConfiguration'
        AutoScalingConfigurationSummary:
          $ref: '#/components/schemas/AutoScalingConfigurationSummary'
        NetworkConfiguration:
          type: object
          properties:
            EgressConfiguration:
              type: object
              properties:
                EgressType:
                  type: string
                  enum:
                  - DEFAULT
                  - VPC
                VpcConnectorArn:
                  type: string
            IngressConfiguration:
              type: object
              properties:
                IsPubliclyAccessible:
                  type: boolean
            IpAddressType:
              type: string
              enum:
              - IPV4
              - DUAL_STACK
        ObservabilityConfiguration:
          type: object
          properties:
            ObservabilityEnabled:
              type: boolean
            ObservabilityConfigurationArn:
              type: string
        EncryptionConfiguration:
          type: object
          properties:
            KmsKey:
              type: string
    ServiceSummary:
      type: object
      properties:
        ServiceName:
          type: string
        ServiceId:
          type: string
        ServiceArn:
          type: string
        ServiceUrl:
          type: string
        CreatedAt:
          type: string
          format: date-time
        UpdatedAt:
          type: string
          format: date-time
        Status:
          type: string
          enum:
          - CREATE_FAILED
          - RUNNING
          - DELETED
          - DELETE_FAILED
          - PAUSED
          - OPERATION_IN_PROGRESS
    CreateServiceRequest:
      type: object
      required:
      - ServiceName
      - SourceConfiguration
      properties:
        ServiceName:
          type: string
        SourceConfiguration:
          $ref: '#/components/schemas/SourceConfiguration'
        InstanceConfiguration:
          $ref: '#/components/schemas/InstanceConfiguration'
        Tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        EncryptionConfiguration:
          type: object
          properties:
            KmsKey:
              type: string
        HealthCheckConfiguration:
          $ref: '#/components/schemas/HealthCheckConfiguration'
        AutoScalingConfigurationArn:
          type: string
        NetworkConfiguration:
          type: object
          properties:
            EgressConfiguration:
              type: object
              properties:
                EgressType:
                  type: string
                  enum:
                  - DEFAULT
                  - VPC
                VpcConnectorArn:
                  type: string
            IngressConfiguration:
              type: object
              properties:
                IsPubliclyAccessible:
                  type: boolean
            IpAddressType:
              type: string
              enum:
              - IPV4
              - DUAL_STACK
        ObservabilityConfiguration:
          type: object
          properties:
            ObservabilityEnabled:
              type: boolean
            ObservabilityConfigurationArn:
              type: string
    UpdateServiceRequest:
      type: object
      required:
      - ServiceArn
      properties:
        ServiceArn:
          type: string
        SourceConfiguration:
          $ref: '#/components/schemas/SourceConfiguration'
        InstanceConfiguration:
          $ref: '#/components/schemas/InstanceConfiguration'
        AutoScalingConfigurationArn:
          type: string
        HealthCheckConfiguration:
          $ref: '#/components/schemas/HealthCheckConfiguration'
        NetworkConfiguration:
          type: object
          properties:
            EgressConfiguration:
              type: object
              properties:
                EgressType:
                  type: string
                  enum:
                  - DEFAULT
                  - VPC
                VpcConnectorArn:
                  type: string
            IngressConfiguration:
              type: object
              properties:
                IsPubliclyAccessible:
                  type: boolean
            IpAddressType:
              type: string
              enum:
              - IPV4
              - DUAL_STACK
        ObservabilityConfiguration:
          type: object
          properties:
            ObservabilityEnabled:
              type: boolean
            ObservabilityConfigurationArn:
              type: string
    SourceConfiguration:
      type: object
      properties:
        CodeRepository:
          type: object
          properties:
            RepositoryUrl:
              type: string
            SourceCodeVersion:
              type: object
              properties:
                Type:
                  type: string
                  enum:
                  - BRANCH
                Value:
                  type: string
            CodeConfiguration:
              type: object
              properties:
                ConfigurationSource:
                  type: string
                  enum:
                  - REPOSITORY
                  - API
                CodeConfigurationValues:
                  type: object
                  properties:
                    Runtime:
                      type: string
                      enum:
                      - PYTHON_3
                      - NODEJS_12
                      - NODEJS_14
                      - NODEJS_16
                      - NODEJS_18
                      - CORRETTO_8
                      - CORRETTO_11
                      - GO_1
                      - DOTNET_6
                      - PHP_81
                      - RUBY_31
                    BuildCommand:
                      type: string
                    StartCommand:
                      type: string
                    Port:
                      type: string
                    RuntimeEnvironmentVariables:
                      type: object
                      additionalProperties:
                        type: string
                    RuntimeEnvironmentSecrets:
                      type: object
                      additionalProperties:
                        type: string
            SourceDirectory:
              type: string
