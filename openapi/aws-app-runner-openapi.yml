              type: object
              properties:
                RuntimeEnvironmentVariables:
                  type: object
                  additionalProperties:
                    type: string
                RuntimeEnvironmentSecrets:
                  type: object
                  additionalProperties:
                    type: string
                StartCommand:
                  type: string
                Port:
                  type: string
            ImageRepositoryType:
              type: string
              enum:
              - ECR
              - ECR_PUBLIC
        AutoDeploymentsEnabled:
          type: boolean
        AuthenticationConfiguration:
          type: object
          properties:
            ConnectionArn:
              type: string
            AccessRoleArn:
              type: string
    InstanceConfiguration:
      type: object
      properties:
        Cpu:
          type: string
          description: CPU units (e.g., 1024 for 1 vCPU, 256, 512, 1024, 2048, 4096).
        Memory:
          type: string
          description: Memory in MB (e.g., 2048 for 2 GB).
        InstanceRoleArn:
          type: string
    HealthCheckConfiguration:
      type: object
      properties:
        Protocol:
          type: string
          enum:
          - TCP
          - HTTP
        Path:
          type: string
        Interval:
          type: integer
          description: Interval in seconds between health checks.
        Timeout:
          type: integer
          description: Timeout in seconds for each health check.
        HealthyThreshold:
          type: integer
        UnhealthyThreshold:
          type: integer
    AutoScalingConfiguration:
      type: object
      properties:
        AutoScalingConfigurationArn:
          type: string
        AutoScalingConfigurationName:
          type: string
