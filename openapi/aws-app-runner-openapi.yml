openapi: 3.1.0
info:
  title: AWS App Runner API
  description: >-
    AWS App Runner is a fully managed service for building, deploying, and
    running containerized web applications and APIs. The API provides
    operations for managing App Runner services, connections, auto scaling
    configurations, custom domains, VPC connectors, and observability
    configuration.
  version: '2020-05-15'
  contact:
    name: Amazon Web Services
    url: https://aws.amazon.com/apprunner/
servers:
- url: https://apprunner.{region}.amazonaws.com
  description: AWS App Runner regional endpoint
  variables:
    region:
      default: us-east-1
      description: AWS region
paths:
  /:
    post:
      operationId: CreateService
      summary: AWS App Runner Create an App Runner Service
      description: >-
        Create an AWS App Runner service. After the service is created, the
        action also automatically starts a deployment.
      tags: []
      parameters:
      - name: X-Amz-Target
        in: header
        required: true
        schema:
          type: string
          enum:
          - AppRunner.CreateService
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              $ref: '#/components/schemas/CreateServiceRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  Service:
                    $ref: '#/components/schemas/Service'
                  OperationId:
                    type: string
              examples:
                CreateService200Example:
                  summary: Default CreateService 200 response
                  x-microcks-default: true
                  value:
                    Service:
                      ServiceName: my-app-service
                      ServiceId: abc123
                      ServiceArn: arn:aws:apprunner:us-east-1:123456789:service/my-service
                      ServiceUrl: example-value
                      CreatedAt: example-value
                      UpdatedAt: example-value
                      DeletedAt: example-value
                      Status: CREATE_FAILED
                      SourceConfiguration: example-value
                      InstanceConfiguration: example-value
                      HealthCheckConfiguration: example-value
                      AutoScalingConfigurationSummary: example-value
                      NetworkConfiguration:
                        EgressConfiguration:
                          EgressType: {}
                          VpcConnectorArn: {}
                        IngressConfiguration:
                          IsPubliclyAccessible: {}
                        IpAddressType: IPV4
                      ObservabilityConfiguration:
                        ObservabilityEnabled: true
                        ObservabilityConfigurationArn: arn:aws:apprunner:us-east-1:123456789:service/my-service
                      EncryptionConfiguration:
                        KmsKey: example-value
                    OperationId: abc123
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /#ListServices:
    post:
      operationId: ListServices
      summary: AWS App Runner List App Runner Services
      description: Returns a list of running App Runner services in your AWS account.
      tags: []
      parameters:
      - name: X-Amz-Target
        in: header
        required: true
        schema:
          type: string
          enum:
          - AppRunner.ListServices
      requestBody:
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                MaxResults:
                  type: integer
                  minimum: 1
                  maximum: 25
                NextToken:
                  type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ServiceSummaryList:
                    type: array
                    items:
                      $ref: '#/components/schemas/ServiceSummary'
                  NextToken:
                    type: string
              examples:
                ListServices200Example:
                  summary: Default ListServices 200 response
                  x-microcks-default: true
                  value:
                    ServiceSummaryList:
                    - example-value
                    NextToken: example-value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
