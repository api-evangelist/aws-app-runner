openapi: 3.1.0
info:
  title: AWS App Runner API
  description: >-
    AWS App Runner is a fully managed service for building, deploying, and
    running containerized web applications and APIs. The API provides
    operations for managing App Runner services, connections, auto scaling
    configurations, custom domains, VPC connectors, and observability
    configuration.
  version: '2020-05-15'
  contact:
    name: Amazon Web Services
    url: https://aws.amazon.com/apprunner/
servers:
  - url: https://apprunner.{region}.amazonaws.com
    description: AWS App Runner regional endpoint
    variables:
      region:
        default: us-east-1
        description: AWS region
paths:
  /:
    post:
      operationId: CreateService
      summary: AWS App Runner Create an App Runner service
      description: >-
        Create an AWS App Runner service. After the service is created, the
        action also automatically starts a deployment.
      tags: []
      parameters:
        - name: X-Amz-Target
          in: header
          required: true
          schema:
            type: string
            enum:
              - AppRunner.CreateService
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              $ref: '#/components/schemas/CreateServiceRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  Service:
                    $ref: '#/components/schemas/Service'
                  OperationId:
                    type: string
  /#ListServices:
    post:
      operationId: ListServices
      summary: AWS App Runner List App Runner services
      description: Returns a list of running App Runner services in your AWS account.
      tags: []
      parameters:
        - name: X-Amz-Target
          in: header
          required: true
          schema:
            type: string
            enum:
              - AppRunner.ListServices
      requestBody:
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                MaxResults:
                  type: integer
                  minimum: 1
                  maximum: 25
                NextToken:
                  type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ServiceSummaryList:
                    type: array
                    items:
                      $ref: '#/components/schemas/ServiceSummary'
                  NextToken:
                    type: string
  /#DescribeService:
    post:
      operationId: DescribeService
      summary: AWS App Runner Describe an App Runner service
      description: Returns a full description of an App Runner service.
      tags: []
      parameters:
        - name: X-Amz-Target
          in: header
          required: true
          schema:
            type: string
            enum:
              - AppRunner.DescribeService
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              required:
                - ServiceArn
              properties:
                ServiceArn:
                  type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  Service:
                    $ref: '#/components/schemas/Service'
  /#UpdateService:
    post:
      operationId: UpdateService
      summary: AWS App Runner Update an App Runner service
      description: >-
        Update an AWS App Runner service. You can update the source
        configuration, instance configuration, auto scaling, and health
        check configuration.
      tags: []
      parameters:
        - name: X-Amz-Target
          in: header
          required: true
          schema:
            type: string
            enum:
              - AppRunner.UpdateService
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              $ref: '#/components/schemas/UpdateServiceRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  Service:
                    $ref: '#/components/schemas/Service'
                  OperationId:
                    type: string
  /#DeleteService:
    post:
      operationId: DeleteService
      summary: AWS App Runner Delete an App Runner service
      description: Delete an AWS App Runner service.
      tags: []
      parameters:
        - name: X-Amz-Target
          in: header
          required: true
          schema:
            type: string
            enum:
              - AppRunner.DeleteService
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              required:
                - ServiceArn
              properties:
                ServiceArn:
                  type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  Service:
                    $ref: '#/components/schemas/Service'
                  OperationId:
                    type: string
  /#PauseService:
    post:
      operationId: PauseService
      summary: AWS App Runner Pause an App Runner service
      description: >-
        Pause an active AWS App Runner service. Pausing a service reduces
        costs by stopping the running instances.
      tags: []
      parameters:
        - name: X-Amz-Target
          in: header
          required: true
          schema:
            type: string
            enum:
              - AppRunner.PauseService
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              required:
                - ServiceArn
              properties:
                ServiceArn:
                  type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  Service:
                    $ref: '#/components/schemas/Service'
                  OperationId:
                    type: string
  /#ResumeService:
    post:
      operationId: ResumeService
      summary: AWS App Runner Resume an App Runner service
      description: Resume an active AWS App Runner service that was previously paused.
      tags: []
      parameters:
        - name: X-Amz-Target
          in: header
          required: true
          schema:
            type: string
            enum:
              - AppRunner.ResumeService
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              required:
                - ServiceArn
              properties:
                ServiceArn:
                  type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  Service:
                    $ref: '#/components/schemas/Service'
                  OperationId:
                    type: string
  /#StartDeployment:
    post:
      operationId: StartDeployment
      summary: AWS App Runner Start a deployment
      description: Initiate a manual deployment of the latest commit in a source code repository or the latest image in a source image repository.
      tags:
        - Deployments
      parameters:
        - name: X-Amz-Target
          in: header
          required: true
          schema:
            type: string
            enum:
              - AppRunner.StartDeployment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              required:
                - ServiceArn
              properties:
                ServiceArn:
                  type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  OperationId:
                    type: string
  /#ListOperations:
    post:
      operationId: ListOperations
      summary: AWS App Runner List operations
      description: Return a list of operations that occurred on an App Runner service.
      tags:
        - Deployments
      parameters:
        - name: X-Amz-Target
          in: header
          required: true
          schema:
            type: string
            enum:
              - AppRunner.ListOperations
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              required:
                - ServiceArn
              properties:
                ServiceArn:
                  type: string
                MaxResults:
                  type: integer
                NextToken:
                  type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  OperationSummaryList:
                    type: array
                    items:
                      $ref: '#/components/schemas/OperationSummary'
                  NextToken:
                    type: string
  /#CreateConnection:
    post:
      operationId: CreateConnection
      summary: AWS App Runner Create a connection
      description: Create an AWS App Runner connection resource for a source code provider (e.g., GitHub).
      tags:
        - Connections
      parameters:
        - name: X-Amz-Target
          in: header
          required: true
          schema:
            type: string
            enum:
              - AppRunner.CreateConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              required:
                - ConnectionName
                - ProviderType
              properties:
                ConnectionName:
                  type: string
                ProviderType:
                  type: string
                  enum:
                    - GITHUB
                    - BITBUCKET
                Tags:
                  type: array
                  items:
                    $ref: '#/components/schemas/Tag'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  Connection:
                    $ref: '#/components/schemas/Connection'
  /#ListConnections:
    post:
      operationId: ListConnections
      summary: AWS App Runner List connections
      description: Returns a list of App Runner connection resources in your AWS account.
      tags:
        - Connections
      parameters:
        - name: X-Amz-Target
          in: header
          required: true
          schema:
            type: string
            enum:
              - AppRunner.ListConnections
      requestBody:
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ConnectionName:
                  type: string
                MaxResults:
                  type: integer
                NextToken:
                  type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ConnectionSummaryList:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConnectionSummary'
                  NextToken:
                    type: string
  /#DeleteConnection:
    post:
      operationId: DeleteConnection
      summary: AWS App Runner Delete a connection
      description: Delete an App Runner connection.
      tags:
        - Connections
      parameters:
        - name: X-Amz-Target
          in: header
          required: true
          schema:
            type: string
            enum:
              - AppRunner.DeleteConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              required:
                - ConnectionArn
              properties:
                ConnectionArn:
                  type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  Connection:
                    $ref: '#/components/schemas/Connection'
  /#CreateAutoScalingConfiguration:
    post:
      operationId: CreateAutoScalingConfiguration
      summary: AWS App Runner Create an auto scaling configuration
      description: Create an App Runner automatic scaling configuration resource.
      tags:
        - Auto Scaling
      parameters:
        - name: X-Amz-Target
          in: header
          required: true
          schema:
            type: string
            enum:
              - AppRunner.CreateAutoScalingConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              required:
                - AutoScalingConfigurationName
              properties:
                AutoScalingConfigurationName:
                  type: string
                MaxConcurrency:
                  type: integer
                MinSize:
                  type: integer
                MaxSize:
                  type: integer
                Tags:
                  type: array
                  items:
                    $ref: '#/components/schemas/Tag'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  AutoScalingConfiguration:
                    $ref: '#/components/schemas/AutoScalingConfiguration'
  /#ListAutoScalingConfigurations:
    post:
      operationId: ListAutoScalingConfigurations
      summary: AWS App Runner List auto scaling configurations
      description: Returns a list of App Runner automatic scaling configurations.
      tags:
        - Auto Scaling
      parameters:
        - name: X-Amz-Target
          in: header
          required: true
          schema:
            type: string
            enum:
              - AppRunner.ListAutoScalingConfigurations
      requestBody:
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                AutoScalingConfigurationName:
                  type: string
                LatestOnly:
                  type: boolean
                MaxResults:
                  type: integer
                NextToken:
                  type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  AutoScalingConfigurationSummaryList:
                    type: array
                    items:
                      $ref: '#/components/schemas/AutoScalingConfigurationSummary'
                  NextToken:
                    type: string
  /#AssociateCustomDomain:
    post:
      operationId: AssociateCustomDomain
      summary: AWS App Runner Associate a custom domain
      description: Associate your own domain name with the App Runner subdomain URL of your service.
      tags:
        - Custom Domains
      parameters:
        - name: X-Amz-Target
          in: header
          required: true
          schema:
            type: string
            enum:
              - AppRunner.AssociateCustomDomain
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              required:
                - ServiceArn
                - DomainName
              properties:
                ServiceArn:
                  type: string
                DomainName:
                  type: string
                EnableWWWSubdomain:
                  type: boolean
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  DNSTarget:
                    type: string
                  ServiceArn:
                    type: string
                  CustomDomain:
                    $ref: '#/components/schemas/CustomDomain'
                  VpcDNSTargets:
                    type: array
                    items:
                      $ref: '#/components/schemas/VpcDNSTarget'
  /#DescribeCustomDomains:
    post:
      operationId: DescribeCustomDomains
      summary: AWS App Runner Describe custom domains
      description: Return a description of custom domain names associated with an App Runner service.
      tags:
        - Custom Domains
      parameters:
        - name: X-Amz-Target
          in: header
          required: true
          schema:
            type: string
            enum:
              - AppRunner.DescribeCustomDomains
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              required:
                - ServiceArn
              properties:
                ServiceArn:
                  type: string
                MaxResults:
                  type: integer
                NextToken:
                  type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  DNSTarget:
                    type: string
                  ServiceArn:
                    type: string
                  CustomDomains:
                    type: array
                    items:
                      $ref: '#/components/schemas/CustomDomain'
                  VpcDNSTargets:
                    type: array
                    items:
                      $ref: '#/components/schemas/VpcDNSTarget'
                  NextToken:
                    type: string
  /#DisassociateCustomDomain:
    post:
      operationId: DisassociateCustomDomain
      summary: AWS App Runner Disassociate a custom domain
      description: Disassociate a custom domain name from an App Runner service.
      tags:
        - Custom Domains
      parameters:
        - name: X-Amz-Target
          in: header
          required: true
          schema:
            type: string
            enum:
              - AppRunner.DisassociateCustomDomain
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              required:
                - ServiceArn
                - DomainName
              properties:
                ServiceArn:
                  type: string
                DomainName:
                  type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  DNSTarget:
                    type: string
                  ServiceArn:
                    type: string
                  CustomDomain:
                    $ref: '#/components/schemas/CustomDomain'
                  VpcDNSTargets:
                    type: array
                    items:
                      $ref: '#/components/schemas/VpcDNSTarget'
  /#CreateVpcConnector:
    post:
      operationId: CreateVpcConnector
      summary: AWS App Runner Create a VPC connector
      description: Create an App Runner VPC connector resource for associating an App Runner service with a custom VPC.
      tags:
        - VPC
      parameters:
        - name: X-Amz-Target
          in: header
          required: true
          schema:
            type: string
            enum:
              - AppRunner.CreateVpcConnector
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              required:
                - VpcConnectorName
                - Subnets
              properties:
                VpcConnectorName:
                  type: string
                Subnets:
                  type: array
                  items:
                    type: string
                SecurityGroups:
                  type: array
                  items:
                    type: string
                Tags:
                  type: array
                  items:
                    $ref: '#/components/schemas/Tag'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  VpcConnector:
                    $ref: '#/components/schemas/VpcConnector'
  /#ListVpcConnectors:
    post:
      operationId: ListVpcConnectors
      summary: AWS App Runner List VPC connectors
      description: Returns a list of App Runner VPC connectors in your AWS account.
      tags:
        - VPC
      parameters:
        - name: X-Amz-Target
          in: header
          required: true
          schema:
            type: string
            enum:
              - AppRunner.ListVpcConnectors
      requestBody:
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                MaxResults:
                  type: integer
                NextToken:
                  type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  VpcConnectors:
                    type: array
                    items:
                      $ref: '#/components/schemas/VpcConnector'
                  NextToken:
                    type: string
  /#CreateObservabilityConfiguration:
    post:
      operationId: CreateObservabilityConfiguration
      summary: AWS App Runner Create an observability configuration
      description: Create an App Runner observability configuration resource.
      tags:
        - Observability
      parameters:
        - name: X-Amz-Target
          in: header
          required: true
          schema:
            type: string
            enum:
              - AppRunner.CreateObservabilityConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              required:
                - ObservabilityConfigurationName
              properties:
                ObservabilityConfigurationName:
                  type: string
                TraceConfiguration:
                  type: object
                  properties:
                    Vendor:
                      type: string
                      enum:
                        - AWSXRAY
                Tags:
                  type: array
                  items:
                    $ref: '#/components/schemas/Tag'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ObservabilityConfiguration:
                    $ref: '#/components/schemas/ObservabilityConfiguration'
components:
  schemas:
    Service:
      type: object
      properties:
        ServiceName:
          type: string
        ServiceId:
          type: string
        ServiceArn:
          type: string
        ServiceUrl:
          type: string
        CreatedAt:
          type: string
          format: date-time
        UpdatedAt:
          type: string
          format: date-time
        DeletedAt:
          type: string
          format: date-time
        Status:
          type: string
          enum:
            - CREATE_FAILED
            - RUNNING
            - DELETED
            - DELETE_FAILED
            - PAUSED
            - OPERATION_IN_PROGRESS
        SourceConfiguration:
          $ref: '#/components/schemas/SourceConfiguration'
        InstanceConfiguration:
          $ref: '#/components/schemas/InstanceConfiguration'
        HealthCheckConfiguration:
          $ref: '#/components/schemas/HealthCheckConfiguration'
        AutoScalingConfigurationSummary:
          $ref: '#/components/schemas/AutoScalingConfigurationSummary'
        NetworkConfiguration:
          type: object
          properties:
            EgressConfiguration:
              type: object
              properties:
                EgressType:
                  type: string
                  enum:
                    - DEFAULT
                    - VPC
                VpcConnectorArn:
                  type: string
            IngressConfiguration:
              type: object
              properties:
                IsPubliclyAccessible:
                  type: boolean
            IpAddressType:
              type: string
              enum:
                - IPV4
                - DUAL_STACK
        ObservabilityConfiguration:
          type: object
          properties:
            ObservabilityEnabled:
              type: boolean
            ObservabilityConfigurationArn:
              type: string
        EncryptionConfiguration:
          type: object
          properties:
            KmsKey:
              type: string
    ServiceSummary:
      type: object
      properties:
        ServiceName:
          type: string
        ServiceId:
          type: string
        ServiceArn:
          type: string
        ServiceUrl:
          type: string
        CreatedAt:
          type: string
          format: date-time
        UpdatedAt:
          type: string
          format: date-time
        Status:
          type: string
          enum:
            - CREATE_FAILED
            - RUNNING
            - DELETED
            - DELETE_FAILED
            - PAUSED
            - OPERATION_IN_PROGRESS
    CreateServiceRequest:
      type: object
      required:
        - ServiceName
        - SourceConfiguration
      properties:
        ServiceName:
          type: string
        SourceConfiguration:
          $ref: '#/components/schemas/SourceConfiguration'
        InstanceConfiguration:
          $ref: '#/components/schemas/InstanceConfiguration'
        Tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        EncryptionConfiguration:
          type: object
          properties:
            KmsKey:
              type: string
        HealthCheckConfiguration:
          $ref: '#/components/schemas/HealthCheckConfiguration'
        AutoScalingConfigurationArn:
          type: string
        NetworkConfiguration:
          type: object
          properties:
            EgressConfiguration:
              type: object
              properties:
                EgressType:
                  type: string
                  enum:
                    - DEFAULT
                    - VPC
                VpcConnectorArn:
                  type: string
            IngressConfiguration:
              type: object
              properties:
                IsPubliclyAccessible:
                  type: boolean
            IpAddressType:
              type: string
              enum:
                - IPV4
                - DUAL_STACK
        ObservabilityConfiguration:
          type: object
          properties:
            ObservabilityEnabled:
              type: boolean
            ObservabilityConfigurationArn:
              type: string
    UpdateServiceRequest:
      type: object
      required:
        - ServiceArn
      properties:
        ServiceArn:
          type: string
        SourceConfiguration:
          $ref: '#/components/schemas/SourceConfiguration'
        InstanceConfiguration:
          $ref: '#/components/schemas/InstanceConfiguration'
        AutoScalingConfigurationArn:
          type: string
        HealthCheckConfiguration:
          $ref: '#/components/schemas/HealthCheckConfiguration'
        NetworkConfiguration:
          type: object
          properties:
            EgressConfiguration:
              type: object
              properties:
                EgressType:
                  type: string
                  enum:
                    - DEFAULT
                    - VPC
                VpcConnectorArn:
                  type: string
            IngressConfiguration:
              type: object
              properties:
                IsPubliclyAccessible:
                  type: boolean
            IpAddressType:
              type: string
              enum:
                - IPV4
                - DUAL_STACK
        ObservabilityConfiguration:
          type: object
          properties:
            ObservabilityEnabled:
              type: boolean
            ObservabilityConfigurationArn:
              type: string
    SourceConfiguration:
      type: object
      properties:
        CodeRepository:
          type: object
          properties:
            RepositoryUrl:
              type: string
            SourceCodeVersion:
              type: object
              properties:
                Type:
                  type: string
                  enum:
                    - BRANCH
                Value:
                  type: string
            CodeConfiguration:
              type: object
              properties:
                ConfigurationSource:
                  type: string
                  enum:
                    - REPOSITORY
                    - API
                CodeConfigurationValues:
                  type: object
                  properties:
                    Runtime:
                      type: string
                      enum:
                        - PYTHON_3
                        - NODEJS_12
                        - NODEJS_14
                        - NODEJS_16
                        - NODEJS_18
                        - CORRETTO_8
                        - CORRETTO_11
                        - GO_1
                        - DOTNET_6
                        - PHP_81
                        - RUBY_31
                    BuildCommand:
                      type: string
                    StartCommand:
                      type: string
                    Port:
                      type: string
                    RuntimeEnvironmentVariables:
                      type: object
                      additionalProperties:
                        type: string
                    RuntimeEnvironmentSecrets:
                      type: object
                      additionalProperties:
                        type: string
            SourceDirectory:
              type: string
        ImageRepository:
          type: object
          properties:
            ImageIdentifier:
              type: string
            ImageConfiguration:
              type: object
              properties:
                RuntimeEnvironmentVariables:
                  type: object
                  additionalProperties:
                    type: string
                RuntimeEnvironmentSecrets:
                  type: object
                  additionalProperties:
                    type: string
                StartCommand:
                  type: string
                Port:
                  type: string
            ImageRepositoryType:
              type: string
              enum:
                - ECR
                - ECR_PUBLIC
