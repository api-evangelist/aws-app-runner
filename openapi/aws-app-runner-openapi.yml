          enum:
          - PENDING_HANDSHAKE
          - AVAILABLE
          - ERROR
          - DELETED
        CreatedAt:
          type: string
          format: date-time
    ConnectionSummary:
      type: object
      properties:
        ConnectionName:
          type: string
        ConnectionArn:
          type: string
        ProviderType:
          type: string
          enum:
          - GITHUB
          - BITBUCKET
        Status:
          type: string
          enum:
          - PENDING_HANDSHAKE
          - AVAILABLE
          - ERROR
          - DELETED
        CreatedAt:
          type: string
          format: date-time
    CustomDomain:
      type: object
      properties:
        DomainName:
          type: string
        EnableWWWSubdomain:
          type: boolean
        CertificateValidationRecords:
          type: array
          items:
            type: object
            properties:
              Name:
                type: string
              Type:
                type: string
              Value:
                type: string
              Status:
                type: string
                enum:
                - PENDING_VALIDATION
                - SUCCESS
                - FAILED
        Status:
          type: string
          enum:
          - CREATING
          - CREATE_FAILED
          - ACTIVE
          - DELETING
          - DELETE_FAILED
          - PENDING_CERTIFICATE_DNS_VALIDATION
          - BINDING_CERTIFICATE
    VpcDNSTarget:
      type: object
      properties:
        VpcIngressConnectionArn:
          type: string
        VpcId:
          type: string
        DomainName:
          type: string
    VpcConnector:
      type: object
      properties:
        VpcConnectorName:
          type: string
        VpcConnectorArn:
          type: string
        VpcConnectorRevision:
          type: integer
        Subnets:
          type: array
          items:
            type: string
        SecurityGroups:
          type: array
          items:
            type: string
        Status:
          type: string
          enum:
          - ACTIVE
          - INACTIVE
        CreatedAt:
          type: string
          format: date-time
        DeletedAt:
          type: string
          format: date-time
    ObservabilityConfiguration:
      type: object
      properties:
        ObservabilityConfigurationArn:
          type: string
        ObservabilityConfigurationName:
          type: string
        ObservabilityConfigurationRevision:
          type: integer
        Latest:
          type: boolean
        Status:
          type: string
          enum:
          - ACTIVE
          - INACTIVE
        TraceConfiguration:
          type: object
          properties:
            Vendor:
              type: string
              enum:
              - AWSXRAY
        CreatedAt:
          type: string
          format: date-time
        DeletedAt:
          type: string
          format: date-time
    OperationSummary:
      type: object
      properties:
        Id:
          type: string
        Type:
          type: string
          enum:
          - CREATE_SERVICE
          - START_DEPLOYMENT
          - PAUSE_SERVICE
          - RESUME_SERVICE
          - DELETE_SERVICE
          - UPDATE_SERVICE
        Status:
          type: string
          enum:
          - PENDING
          - IN_PROGRESS
          - FAILED
          - SUCCEEDED
          - ROLLBACK_IN_PROGRESS
          - ROLLBACK_FAILED
          - ROLLBACK_SUCCEEDED
        TargetArn:
          type: string
        StartedAt:
          type: string
          format: date-time
        EndedAt:
          type: string
          format: date-time
        UpdatedAt:
          type: string
          format: date-time
    Tag:
